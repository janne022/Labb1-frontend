<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="../styles/main.css">
        <link rel="stylesheet" type="text/css" href="../styles/portfolio.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
            rel="stylesheet">
        <script src="../scripts/portfolio.js" defer></script>
        <script src="../scripts/easter-eggs.js" defer></script>
        <title>Portfolio</title>
    </head>

    <body>
        <header>
            <nav>
                <ul class="nav-links">
                    <li><a href="home.html">Home</a></li>
                    <li class="active"><a
                            href="portfolio.html">Portfolio</a></li>
                    <li><a href="cv.html">CV</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="portfolio-section">
                <h1>Portfolio</h1>
                <div id="card-container">
                    <template id="card-template">
                        <article class="card">
                            <h2 class="card-title"></h2>
                            <h4 class="card-subheading"></h4>
                            <img class="card-image" src srcset
                                alt="Project Image">
                            <button class="open-modal-btn">View Project</button>
                        </article>
                    </template>
                </div>

                <dialog id="project-modal">
                    <article class="card">
                        <h2 class="card-title"></h2>
                        <h4 class="card-subheading"></h4>
                        <p class="card-body"></p>
                        <button id="close-modal-btn">Close</button>
                    </article>
                </dialog>
            </section>
        </main>
    </body>
</html>
